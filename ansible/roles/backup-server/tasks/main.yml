---
- name: Create backups directory
  file:
    path: /backups
    state: directory
    owner: devops
    group: devops

- name: Create scripts directory
  file:
    path: /home/devops/scripts
    state: directory
    owner: devops
    group: devops

- name: Create backup log file
  file:

    path: /var/log/backup.log
    state: touch
    owner: devops
    group: devops
    mode: '0644'

- name: Copy backup script
  copy:
    src: /vagrant/scripts/backup.sh
    dest: /home/devops/scripts/backup.sh
    owner: devops
    group: devops
    mode: '0755'
    remote_src: yes

- name: Copy restore script
  copy:
    src: /vagrant/scripts/restore.sh
    dest: /home/devops/scripts/restore.sh
    owner: devops
    group: devops
    mode: '0755'
    remote_src: yes

- name: Schedule weekly backup via cron
  cron:
    name: weekly backup
    user: devops
    minute: '0'
    hour: '2'
    weekday: '0'
    job: /home/devops/scripts/backup.sh