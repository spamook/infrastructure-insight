---
- name: Allow port 80 from everywhere
  ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Install nginx and jq
  apt:
    name:
      - nginx
      - jq
    state: present

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Copy nginx load balancer config
  copy:
    src: /vagrant/load-balancer/nginx.conf
    dest: /etc/nginx/conf.d/lb.conf
    remote_src: yes
  notify: reload nginx

- name: Copy nginx config template for adaptive LB
  copy:
    src: /vagrant/load-balancer/nginx.conf.template
    dest: /etc/nginx/conf.d/lb.conf.template
    remote_src: yes

- name: Enable and start nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Create scripts directory for devops
  file:
    path: /home/devops/scripts
    state: directory
    owner: devops
    group: devops

- name: Copy adaptive_lb script
  copy:
    src: /vagrant/scripts/adaptive_lb.sh
    dest: /home/devops/scripts/adaptive_lb.sh
    owner: devops
    group: devops
    mode: '0755'
    remote_src: yes

- name: Create adaptive_lb log file
  file:
    path: /var/log/adaptive_lb.log
    state: touch
    owner: devops
    group: devops
    mode: '0644'

- name: Allow devops to reload nginx without password
  copy:
    dest: /etc/sudoers.d/nginx-reload
    content: "devops ALL=(ALL) NOPASSWD: /usr/sbin/nginx, /usr/bin/tee /etc/nginx/conf.d/lb.conf\n"
    validate: 'visudo -cf %s'

- name: Schedule adaptive LB script via cron
  cron:
    name: adaptive load balancer
    user: devops
    minute: '*'
    job: /home/devops/scripts/adaptive_lb.sh