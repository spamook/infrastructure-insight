version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: infra-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks: [infra-net]
    environment:
      - NODE_ENV=production
      - PORT=3001

  frontend:
    build:
      context: ./frontend
    container_name: infra-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks: [infra-net]
    depends_on: [backend]

networks:
  infra-net:
    driver: bridge